name: Build and Release
run-name: Release ${{ github.event.release.tag_name || github.ref_name }}
on:
  release:
    types: [created]
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install Dependencies
      run: brew install ffmpeg xcodegen

    - name: Get the version (and strip 'v' prefix if present)
      id: get_version
      run: |
        # Uses release tag if available, otherwise falls back to ref_name
        TAG_NAME="${{ github.event.release.tag_name || github.ref_name }}"
        # Removes the 'v' (e.g., v1.0.0 becomes 1.0.0) so Xcode doesn't complain
        echo "VERSION=${TAG_NAME#v}" >> $GITHUB_ENV

    - name: Update version number
      run: |
        sed -i '' "s/MARKETING_VERSION: .*/MARKETING_VERSION: ${{ env.VERSION }}/" project.yml

    - name: Generate Xcode project
      run: xcodegen

    - name: Build Xcode project
      run: |
        A4K_SKIP_ADHOC_SIGNING=1 xcodebuild build \
          -scheme "Anime4K-Upscaler" \
          -project "Anime4K-Upscaler.xcodeproj" \
          -configuration Release \
          CODE_SIGN_IDENTITY="" \
          CODE_SIGNING_ALLOWED=NO \
          SYMROOT=build

    - name: Normalize unsigned app bundle
      run: |
        APP_PATH="build/Release/Anime4K Upscaler.app"

        if [[ ! -d "$APP_PATH" ]]; then
          echo "Expected app bundle not found at: $APP_PATH"
          exit 1
        fi

        # Remove any residual signatures to avoid mixed-signature runtime issues.
        FRAMEWORKS_DIR="$APP_PATH/Contents/Frameworks"
        if [[ -d "$FRAMEWORKS_DIR" ]]; then
          while IFS= read -r -d '' item; do
            codesign --remove-signature "$item" 2>/dev/null || true
          done < <(find "$FRAMEWORKS_DIR" -type f \( -name "*.dylib" -o -name "ffmpeg" -o -name "ffprobe" \) -print0)
        fi
        codesign --remove-signature "$APP_PATH" 2>/dev/null || true

    - name: Create DMG
      run: |
        APP_PATH="build/Release/Anime4K Upscaler.app"
        DMG_PATH="build/Anime4K_Upscaler_${{ env.VERSION }}_arm64.dmg"

        mkdir -p build/dmg
        cp -R "$APP_PATH" build/dmg/
        ln -s /Applications build/dmg/Applications

        hdiutil create \
          -volname "Anime4K Upscaler ${{ env.VERSION }}" \
          -srcfolder build/dmg \
          -ov -format UDZO \
          "$DMG_PATH"

        echo "DMG_PATH=$DMG_PATH" >> "$GITHUB_ENV"

    - name: Upload Release Asset
      uses: softprops/action-gh-release@v2
      with:
        name: Anime4K Upscaler ${{ github.event.release.tag_name || github.ref_name }}
        files: ${{ env.DMG_PATH }}
        append_body: true
        body: >-
          This release is intentionally unsigned. On first launch, macOS Gatekeeper may block it; allow it from System Settings > Privacy and Security by clicking Open Anyway, or use Finder right-click Open once. This build uses an unsigned-only packaging path to avoid mixed-signature launch crashes.
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}