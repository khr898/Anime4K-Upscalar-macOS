name: Build and Release
run-name: Release ${{ github.event.release.tag_name || github.ref_name }}
on:
  release:
    types: [created]
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install Dependencies
      run: brew install ffmpeg molten-vk xcodegen

    - name: Resolve release tag and version
      id: get_version
      run: |
        TAG_FROM_RELEASE="${{ github.event.release.tag_name || '' }}"
        TAG_FROM_REF="${{ github.ref_name }}"

        if [[ -n "$TAG_FROM_RELEASE" ]]; then
          RAW_TAG="$TAG_FROM_RELEASE"
          if [[ -n "$TAG_FROM_REF" && "$TAG_FROM_REF" != "$TAG_FROM_RELEASE" ]]; then
            echo "error: ref tag ($TAG_FROM_REF) does not match release tag ($TAG_FROM_RELEASE)"
            exit 1
          fi
        else
          RAW_TAG="$TAG_FROM_REF"
        fi

        if [[ -z "$RAW_TAG" ]]; then
          echo "error: unable to resolve release tag"
          exit 1
        fi

        echo "RAW_TAG=$RAW_TAG" >> "$GITHUB_ENV"
        echo "VERSION=${RAW_TAG#v}" >> "$GITHUB_ENV"

    - name: Update version number
      run: |
        sed -i '' "s/MARKETING_VERSION: .*/MARKETING_VERSION: ${{ env.VERSION }}/" project.yml

    - name: Generate Xcode project
      run: xcodegen

    - name: Build Xcode project
      run: |
        A4K_SKIP_ADHOC_SIGNING=1 xcodebuild build \
          -scheme "Anime4K-Upscaler" \
          -project "Anime4K-Upscaler.xcodeproj" \
          -configuration Release \
          CODE_SIGN_IDENTITY="" \
          CODE_SIGNING_ALLOWED=NO \
          CODE_SIGN_ENTITLEMENTS="" \
          ENABLE_HARDENED_RUNTIME=NO \
          EXCLUDED_SOURCE_FILE_NAMES="phase4_aahq_benchmark.swift" \
          SYMROOT=build

    - name: Normalize app signatures
      run: |
        APP_PATH="build/Release/Anime4K Upscaler.app"

        if [[ ! -d "$APP_PATH" ]]; then
          echo "Expected app bundle not found at: $APP_PATH"
          exit 1
        fi

        FRAMEWORKS_DIR="$APP_PATH/Contents/Frameworks"
        if [[ -d "$FRAMEWORKS_DIR" ]]; then
          while IFS= read -r -d '' item; do
            codesign --remove-signature "$item" 2>/dev/null || true
          done < <(find "$FRAMEWORKS_DIR" -type f \( -name "*.dylib" -o -name "ffmpeg" -o -name "ffprobe" \) -print0)
        fi
        codesign --remove-signature "$APP_PATH" 2>/dev/null || true

        # Re-sign with ad-hoc identity so the bundle remains non-notarized but launchable.
        codesign --force --deep --sign - --timestamp=none "$APP_PATH"

    - name: Validate app signature state
      run: |
        APP_PATH="build/Release/Anime4K Upscaler.app"

        SIGN_INFO="$(codesign -dv "$APP_PATH" 2>&1 || true)"

        TEAM_ID="$(printf '%s\n' "$SIGN_INFO" | awk -F= '/^TeamIdentifier=/{print $2; exit}')"
        if [[ "$TEAM_ID" != "not set" ]]; then
          echo "error: expected ad-hoc TeamIdentifier 'not set', got '${TEAM_ID:-<none>}'"
          exit 1
        fi

        SIGNING_AUTHORITY="$(printf '%s\n' "$SIGN_INFO" | awk -F= '/^Authority=/{print $2; exit}')"
        if [[ -n "$SIGNING_AUTHORITY" && "$SIGNING_AUTHORITY" != "-" ]]; then
          echo "error: expected ad-hoc signing authority when present, got '$SIGNING_AUTHORITY'"
          exit 1
        fi

        if spctl --assess --type execute -vv "$APP_PATH"; then
          echo "warning: app unexpectedly passed Gatekeeper assessment"
        else
          echo "Gatekeeper assessment rejected as expected for non-notarized build."
        fi

    - name: Create DMG
      run: |
        APP_PATH="build/Release/Anime4K Upscaler.app"
        DMG_PATH="build/Anime4K_Upscaler_${{ env.RAW_TAG }}_arm64.dmg"

        mkdir -p build/dmg
        cp -R "$APP_PATH" build/dmg/
        ln -s /Applications build/dmg/Applications

        hdiutil create \
          -volname "Anime4K Upscaler ${{ env.VERSION }}" \
          -srcfolder build/dmg \
          -ov -format UDZO \
          "$DMG_PATH"

        echo "DMG_PATH=$DMG_PATH" >> "$GITHUB_ENV"

    - name: Validate bundled runtime dependencies
      run: |
        FRAMEWORKS_DIR="build/Release/Anime4K Upscaler.app/Contents/Frameworks"
        REQUIRED=(
          "ffmpeg"
          "ffprobe"
          "libMoltenVK.dylib"
        )

        for item in "${REQUIRED[@]}"; do
          if [[ ! -f "$FRAMEWORKS_DIR/$item" ]]; then
            echo "error: missing bundled dependency: $item"
            exit 1
          fi
        done

        echo "Bundled runtime dependency check passed."

    - name: Upload Release Asset
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ env.RAW_TAG }}
        name: Anime4K Upscaler ${{ env.RAW_TAG }}
        files: ${{ env.DMG_PATH }}
        append_body: true
        body: >-
          This release is not Developer ID signed and not notarized. On first launch, macOS Gatekeeper may block it; allow it from System Settings > Privacy and Security by clicking Open Anyway, or use Finder right-click Open once.
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}