name: Anime4K-Upscaler
options:
  bundleIdPrefix: com.anime4k
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true
  groupSortPosition: top
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    ENABLE_HARDENED_RUNTIME: YES
    ALWAYS_EMBED_SWIFT_STANDARD_LIBRARIES: YES
    CODE_SIGN_IDENTITY: "-"
    CODE_SIGN_STYLE: Automatic
    PRODUCT_NAME: "Anime4K Upscaler"

targets:
  Anime4K-Upscaler:
    type: application
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: Anime4K-Upscaler
        excludes:
          - Scripts/**
          - "*.entitlements"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.anime4k.upscaler
        INFOPLIST_GENERATION_MODE: GeneratedFile
        INFOPLIST_KEY_CFBundleDisplayName: "Anime4K Upscaler"
        INFOPLIST_KEY_LSApplicationCategoryType: "public.app-category.video"
        INFOPLIST_KEY_NSHumanReadableCopyright: ""
        CODE_SIGN_ENTITLEMENTS: Anime4K-Upscaler/Anime4K_Upscaler.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        INFOPLIST_KEY_CFBundleIconName: AppIcon
        GENERATE_INFOPLIST_FILE: YES
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: 1.0.0
        SWIFT_EMIT_LOC_STRINGS: YES
    entitlements:
      path: Anime4K-Upscaler/Anime4K_Upscaler.entitlements
      properties:
        com.apple.security.app-sandbox: true
        com.apple.security.files.user-selected.read-write: true
    postBuildScripts:
      - name: "Bundle FFmpeg & Dependencies"
        basedOnDependencyAnalysis: false
        shell: /bin/zsh
        script: |
          "${SRCROOT}/Anime4K-Upscaler/Scripts/bundle_dependencies.sh"
